    base_position_size: 200.0             # 🔥 AI КОНСЕНСУС: 150→200 (больше размер)
    min_position_size: 80.0              # 🔥 AI КОНСЕНСУС: 100→80 (меньше минимум)
    max_position_size: 400.0            # 🔥 AI КОНСЕНСУС: 300→400 (больше максимум)
    max_open_positions: 5                # Стандартно
    max_position_percent: 4.0             # 🔥 AI КОНСЕНСУС: 6→4 (безопаснее)
    trending_boost:
      tp_multiplier: 1.5
      sl_multiplier: 0.7
      ph_threshold: 1.3
      score_threshold: 0.7
      max_trades: 1.5
    ranging_boost:
      tp_multiplier: 1.2
      sl_multiplier: 0.8
      ph_threshold: 1.2
