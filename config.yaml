    min_position_size: 50.0              # 🔥 AI КОНСЕНСУС: 70→50 (меньше минимум)
    max_position_size: 200.0             # Разумный максимум
    max_open_positions: 3                # Стандартно
    max_position_percent: 6.0             # 🔥 AI КОНСЕНСУС: 8→6 (безопаснее)
    trending_boost:
      tp_multiplier: 1.3
      sl_multiplier: 0.8
      ph_threshold: 1.2
